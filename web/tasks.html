<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="/static/vue3/vue3.global.js"></script>
    <link href="/static/bootstrap-5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .task-cell {
            max-width: 32rem;
            max-height: 9rem;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>

<body data-bs-theme="dark">
    <div id="navbar"></div>
    <div class="container mt-5">
        <div id="tasks"></div>
    </div>
    <script src="/static/bootstrap-5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

<script type="module">
    const { createApp } = Vue;
    import NavBar from '/static/js/navbar.js';
    import Tasks from '/static/js/tasks.js';

    document.title = "knot-indexer-lab tasks";

    const navbar = createApp(NavBar);
    const tasks = createApp(Tasks);

    navbar.mount("#navbar");
    tasks.mount("#tasks");
