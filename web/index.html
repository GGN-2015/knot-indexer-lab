<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="/static/vue3/vue3.global.js"></script>
    <link href="/static/bootstrap-5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
</head>

<body data-bs-theme="dark">
    <div id="app"></div>
    <script src="/static/bootstrap-5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

<script type="module">
    const { createApp } = Vue;
    import NavBar from '/static/js/navbar.js';
    import Indexer from '/static/js/indexer.js';
    import Tasks from '/static/js/tasks.js';

    const app = createApp({
        components: { NavBar, Indexer, Tasks },
        data() {
            return {
                website_title: "knot-indexer-lab",
                activeView: "home",
            };
        },
        mounted() {
            document.title = this.website_title;
        },
        methods: {
            showView(view) {
                this.activeView = view === "tasks" ? "tasks" : "home";
                window.scrollTo({ top: 0, behavior: "auto" });
            },
        },
        template: `
            <NavBar :active-view="activeView" @navigate="showView" />
            <main class="container app-shell">
                <section v-show="activeView === 'home'" aria-label="Knot lookup">
                    <Indexer @navigate="showView" />
                </section>
                <section v-show="activeView === 'tasks'" aria-label="Task monitor">
                    <Tasks @navigate="showView" />
                </section>
            </main>
        `,
    });

    app.mount('#app');
</script>

</html>
