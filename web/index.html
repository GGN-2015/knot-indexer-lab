<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="/static/vue3/vue3.global.js"></script>
    <link href="/static/bootstrap-5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .pd-diagram-section {
            margin-bottom: 1rem;
        }

        .pd-diagram-panel {
            background: #fff;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 8px;
            min-height: 180px;
            overflow: hidden;
            padding: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: zoom-in;
        }

        .pd-diagram-panel svg {
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: min(58vh, 620px);
            margin: 0 auto;
        }

        @media (max-width: 576px) {
            .pd-diagram-panel {
                min-height: 150px;
                padding: 0.5rem;
            }

            .pd-diagram-panel svg {
                max-height: 50vh;
            }
        }

        .pd-diagram-viewer {
            position: fixed;
            inset: 0;
            z-index: 1080;
            background: rgba(0, 0, 0, 0.72);
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }

        .pd-diagram-viewer-toolbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .pd-diagram-viewer-zoom {
            min-width: 4rem;
            text-align: center;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .pd-diagram-viewer-stage {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.42);
            cursor: grab;
            touch-action: none;
        }

        .pd-diagram-viewer-stage.is-dragging {
            cursor: grabbing;
        }

        .pd-diagram-viewer-content {
            transform-origin: center center;
            transition: transform 80ms ease-out;
            will-change: transform;
        }

        .pd-diagram-viewer-stage.is-dragging .pd-diagram-viewer-content {
            transition: none;
        }

        .pd-diagram-viewer-content svg {
            display: block;
            width: auto;
            height: auto;
            max-width: min(88vw, 1200px);
            max-height: calc(100vh - 8rem);
            background: #fff;
        }

        @media (max-width: 576px) {
            .pd-diagram-viewer {
                padding: 0.5rem;
            }

            .pd-diagram-viewer-toolbar {
                gap: 0.35rem;
                margin-bottom: 0.5rem;
            }

            .pd-diagram-viewer-zoom {
                min-width: 3.25rem;
            }

            .pd-diagram-viewer-content svg {
                max-width: 94vw;
                max-height: calc(100vh - 6rem);
            }
        }
    </style>
</head>

<body data-bs-theme="dark">
    <div id="navbar"></div>
    <div id="app"></div>

    <div class="container mt-5">
        <div id="indexer"></div>
    </div>
    <script src="/static/bootstrap-5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

<script type="module">
    const { createApp } = Vue;
    import NavBar from '/static/js/navbar.js';
    import Indexer from '/static/js/indexer.js';

    const navbar = createApp(NavBar);
    const indexer = createApp(Indexer);

    const app = createApp({
        data() {
            return {
                website_title: "knot-indexer-lab",
            };
        },
        async mounted() {
            document.title = this.website_title;
        },
    });

    app.mount('#app');
    navbar.mount("#navbar");
    indexer.mount("#indexer");
</script>

</html>
